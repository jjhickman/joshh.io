name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Never cancel an in-flight production deployment; rapid successive merges
# collapse to the newest pending run, which ships the full current tree.
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix infra ci

      # A production deployment is self-contained: it re-runs the gates
      # rather than trusting a separate workflow's timing. The secrets stage
      # is skipped here only because gitleaks already ran in Checks on this
      # same ref with full history; everything else repeats.
      - name: Typecheck, lint, and test
        run: |
          npm run typecheck
          npm run lint
          npm run test
          npm --prefix infra run check

      - name: Production build
        run: npm run build

      - name: Enforce bundle budgets
        run: npm run check:bundle

      - name: Assume the deployment role via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 3600

      - name: Deploy JoshhIo-Site
        run: npm --prefix infra run cdk:deploy -- JoshhIo-Site --require-approval never

      - name: Smoke-check the live site
        run: |
          for url in "https://joshh.io" "https://joshh.io/music"; do
            ok=""
            for attempt in 1 2 3 4 5; do
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo 000)
              if [ "$code" = "200" ]; then
                echo "$url -> $code"
                ok=1
                break
              fi
              echo "$url -> $code (attempt $attempt); retrying in 15s"
              sleep 15
            done
            if [ -z "$ok" ]; then
              echo "Smoke check failed for $url"
              exit 1
            fi
          done

      - name: Deployment summary
        run: |
          {
            echo "## joshh.io deployment"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Canonical URL: https://joshh.io"
          } >> "$GITHUB_STEP_SUMMARY"
