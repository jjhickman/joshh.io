name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    environment: production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Install gitleaks
        env:
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          GITLEAKS_VERSION: 8.30.1
        run: |
          archive_name="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          archive="${RUNNER_TEMP}/${archive_name}"
          curl --fail --location --silent --show-error \
            --output "${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive_name}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check -
          tar --directory "${RUNNER_TEMP}" --extract --gzip --file "${archive}" gitleaks
          sudo install --mode 0755 "${RUNNER_TEMP}/gitleaks" /usr/local/bin/gitleaks

      - name: Install frontend dependencies
        run: npm ci

      - name: Install infrastructure dependencies
        run: npm --prefix infra ci

      - name: Audit infrastructure dependencies
        run: npm --prefix infra audit --audit-level=high

      - name: Check frontend
        run: npm run check

      - name: Check infrastructure
        run: npm --prefix infra run check

      - name: Build site
        run: npm run build

      - name: Scan built site
        run: gitleaks detect --no-git --source dist --config .gitleaks.toml --no-banner --redact

      - name: Check bundle budgets
        run: npm run check:bundle

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-east-1
          role-duration-seconds: 1800
          role-session-name: joshh-io-${{ github.run_id }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Synthesize infrastructure
        run: npm --prefix infra run cdk:synth

      - name: Deploy site
        run: npm --prefix infra run cdk:deploy -- JoshhIo-Site --require-approval never

      - name: Smoke-check production
        run: |
          for url in https://joshh.io https://joshh.io/music; do
            curl --fail --location --silent --show-error \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 5 \
              "${url}" > /dev/null
          done

      - name: Write deployment summary
        if: success()
        run: |
          {
            echo "### Production deployment"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Stack: \`JoshhIo-Site\`"
            echo "- Canonical URL: https://joshh.io"
          } >> "${GITHUB_STEP_SUMMARY}"
