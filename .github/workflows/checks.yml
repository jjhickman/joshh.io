name: Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Install gitleaks
        env:
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          GITLEAKS_VERSION: 8.30.1
        run: |
          archive_name="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          archive="${RUNNER_TEMP}/${archive_name}"
          curl --fail --location --silent --show-error \
            --output "${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive_name}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check -
          tar --directory "${RUNNER_TEMP}" --extract --gzip --file "${archive}" gitleaks
          sudo install --mode 0755 "${RUNNER_TEMP}/gitleaks" /usr/local/bin/gitleaks

      - name: Install frontend dependencies
        run: npm ci

      - name: Install infrastructure dependencies
        run: npm --prefix infra ci

      - name: Audit infrastructure dependencies
        run: npm --prefix infra audit --audit-level=high

      - name: Scan repository history
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact

      - name: Check frontend
        run: npm run check

      - name: Check infrastructure
        run: npm --prefix infra run check

      - name: Build site
        run: npm run build

      - name: Scan built site
        run: gitleaks detect --no-git --source dist --config .gitleaks.toml --no-banner --redact

      - name: Synthesize infrastructure
        run: npm --prefix infra run cdk:synth

      - name: Check bundle budgets
        run: npm run check:bundle

      - name: Upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7
