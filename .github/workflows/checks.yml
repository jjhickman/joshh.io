name: Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Full history so gitleaks can scan the commit range, not one commit.
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend checks (secrets, deps, typecheck, lint, tests)
        run: npm run check

      - name: Install infra dependencies
        run: npm --prefix infra ci

      - name: Infra checks (typecheck, lint, assertion tests)
        run: npm --prefix infra run check

      - name: Credential-free CDK synthesis
        run: npm --prefix infra run cdk:synth

      - name: Production build
        run: npm run build

      - name: Enforce bundle budgets
        run: npm run check:bundle

      - name: Upload build for inspection
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist
          retention-days: 7
